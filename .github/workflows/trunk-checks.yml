name: Trunk Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  trunk-check:
    name: Trunk Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trunk checks
        uses: trunk-io/trunk-action@v1
        with:
          check-mode: all
